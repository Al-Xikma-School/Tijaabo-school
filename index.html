<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL XIKMA SCHOOL - Attendance</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); 
            margin: 0; 
        }
        .container { 
            background: white; 
            padding: 35px; 
            border-radius: 30px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
            width: 360px; 
            text-align: center; 
            /* Xariiq aad u dhumuc weyn oo madow iyo cagaar isugu jira */
            border: 8px solid #1a3a08;
        }
        .logo { width: 110px; height: 110px; margin-bottom: 15px; border-radius: 50%; border: 4px solid #0d1b2a; }
        
        h2 { color: #0d1b2a; border-bottom: 4px solid #1a3a08; display: inline-block; padding-bottom: 5px; margin-top: 0; font-weight: 900; text-transform: uppercase; }
        
        /* --- QAYBTA DOORASHADA MAGACA (BULUUG DIG AH) --- */
        #nameSelect { 
            width: 100%; padding: 14px; margin: 12px 0; 
            border: 4px solid #0d47a1; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 800;
            background-color: #e3f2fd;
            color: #0d47a1;
        }

        /* --- QAYBTA DOORASHADA XAALADDA (CAGAAR DIG AH) --- */
        #shiftSelect { 
            width: 100%; padding: 14px; margin: 12px 0; 
            border: 4px solid #1b5e20; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 800;
            background-color: #e8f5e9;
            color: #1b5e20;
        }

        /* --- QAYBTA PASSWORD-KA (GUDUUD DIG AH) --- */
        #passInput { 
            width: 100%; padding: 14px; margin: 12px 0; 
            border: 4px solid #b71c1c; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 800;
            background-color: #ffebee;
            color: #b71c1c;
        }
        
        .submit-btn { 
            background: #1a3a08; 
            color: white; 
            padding: 18px; 
            border: none; 
            border-radius: 15px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 20px; 
            font-weight: 900; 
            margin-top: 15px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }
        
        button:disabled { background: #455a64 !important; cursor: not-allowed; }
        
        #status { margin-top: 20px; font-weight: 900; font-size: 17px; }
        
        .success-msg { color: #1a3a08; }
        .success-msg h1 { font-size: 60px; margin-bottom: 10px; }
        
        p { color: #000; font-weight: 900; margin-bottom: 5px; font-size: 18px; text-decoration: underline; }

        #form-elements { display: block; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <img src="10754.jpg" alt="Logo" class="logo">
    <h2 id="displaySchoolName">AL XIKMA SCHOOL</h2>
    
    <div id="form-elements">
        <p>Xaadirinta Darawalada</p>

        <select id="nameSelect">
            <option value="">-- Sugaya Magacyada... --</option>
        </select>

        <select id="shiftSelect">
            <option value="">-- Dooro Xaaladda --</option>
            <option value="subax imaansho">Subax Imaansho</option>
            <option value="subax bixitaan">Subax Bixitaan</option>
            <option value="galab imaansho">Galab Imaansho</option>
            <option value="galab bixitaan">Galab Bixitaan</option>
        </select>

        <input type="password" id="passInput" placeholder="Gali Password-kaaga">

        <button id="submitBtn" class="submit-btn" disabled>Hubinta Goobta...</button>
        <div id="status"> Fadlan furo GPS-ka ama Location-ka...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://tijaabo-basas-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let TEACHER_DB = {}; 
    let SETTINGS = {};
    let loggedInEmail = "NO_GOOGLE_AUTH"; 

    db.ref('settings_bus').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            SETTINGS = data;
            document.getElementById('displaySchoolName').innerText = SETTINGS.school_name || "AL XIKMA SCHOOL";
            startGPSWatch();
        }
    });

    db.ref('staff_list').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            TEACHER_DB = data;
            const nameSelect = document.getElementById('nameSelect');
            nameSelect.innerHTML = '<option value="">-- Dooro Magacaaga --</option>';
            Object.keys(data).sort().forEach(name => {
                nameSelect.innerHTML += `<option value="${name}">${name}</option>`;
            });
        }
    });

    function parseTime(t) {
        if (!t) return 0;
        let timeStr = String(t);
        if (timeStr.includes("T")) timeStr = timeStr.split("T")[1];
        const parts = timeStr.split(':');
        return (parseInt(parts[0]) || 0) * 60 + (parseInt(parts[1]) || 0);
    }

    function startGPSWatch() {
        navigator.geolocation.watchPosition((pos) => {
            const now = new Date();
            const currentTime = now.getHours() * 60 + now.getMinutes();
            const shift = document.getElementById('shiftSelect').value.toLowerCase();
            const R = 6371; 
            const lat1 = pos.coords.latitude, lon1 = pos.coords.longitude;
            const dLat = (SETTINGS.lat - lat1) * Math.PI / 180;
            const dLon = (SETTINGS.lon - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(SETTINGS.lat*Math.PI/180) * Math.sin(dLon/2)**2;
            const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            const status = document.getElementById('status');
            const submitBtn = document.getElementById('submitBtn');
            let canSubmit = true;
            let timeStatusMsg = "";

            if (String(SETTINGS.time_limit_on).toLowerCase() === "true" && shift !== "") {
                let start, end;
                if (shift === "subax imaansho") { start = parseTime(SETTINGS.morn_start); end = parseTime(SETTINGS.morn_end); }
                else if (shift === "subax bixitaan") { start = parseTime(SETTINGS.morn_out_start); end = parseTime(SETTINGS.morn_out_end); }
                else if (shift === "galab imaansho") { start = parseTime(SETTINGS.aft_start); end = parseTime(SETTINGS.aft_end); }
                else if (shift === "galab bixitaan") { start = parseTime(SETTINGS.aft_out_start); end = parseTime(SETTINGS.aft_out_end); }

                if (currentTime < start) { timeStatusMsg = "❌ Lama gaarin waqtigii " + shift + "."; canSubmit = false; }
                else if (currentTime > end) { timeStatusMsg = "❌ Waa la soo dhaafay waqtigii " + shift + "."; canSubmit = false; }
            }

            if (!canSubmit) {
                status.innerText = timeStatusMsg; status.style.color = "#bf360c";
                submitBtn.disabled = true; submitBtn.innerText = "WAA XIRAN YAHAY";
            } else if (dist <= SETTINGS.radius) {
                status.innerText = "✅ Hadda iskuulka waad joogtaa ."; status.style.color = "#1a3a08";
                submitBtn.disabled = false; submitBtn.innerText = "XAADIRI";
            } else {
                status.innerText = (SETTINGS.msg_far || "Ma joogtid iskuulka") + " (" + (dist*1000).toFixed(0) + "m).";
                status.style.color = "#b71c1c"; submitBtn.disabled = true; submitBtn.innerText = "HUBINTA GOOBTA...";
            }
        }, null, { enableHighAccuracy: true });
    }

    document.getElementById('submitBtn').addEventListener('click', () => {
        const name = document.getElementById('nameSelect').value;
        const shift = document.getElementById('shiftSelect').value;
        const pass = document.getElementById('passInput').value;
        const moobilka = navigator.userAgent.match(/\(([^)]+)\)/) ? navigator.userAgent.match(/\(([^)]+)\)/)[1].split(';')[0] : "Lama Yaqaan";

        if (!name || !shift || !pass) return alert("Fadlan buuxi dhamaan khaanadaha!");
        if (!TEACHER_DB[name] || String(TEACHER_DB[name].pass) !== String(pass)) return alert("Password-ku waa khaldan yahay!");

        const maanta = new Date().toLocaleDateString('en-GB');

        db.ref('drivers').orderByChild('name').equalTo(name).once('value', (snapshot) => {
            let horay_u_jiray = false;
            snapshot.forEach((child) => {
                const record = child.val();
                const recordDate = new Date(record.time).toLocaleDateString('en-GB');
                if (record.shift === shift && recordDate === maanta) horay_u_jiray = true;
            });

            if (horay_u_jiray) {
                alert("❌ Hore ayaad isugu xaadirisay " + shift + " maanta!");
            } else {
                const newRecordRef = db.ref('drivers').push();
                const uniqueId = newRecordRef.key;

                newRecordRef.set({
                    name: name,
                    email: TEACHER_DB[name].email || "",
                    logged_in_email: loggedInEmail, 
                    shift: shift,
                    device: moobilka,
                    time: firebase.database.ServerValue.TIMESTAMP
                }).then(() => {
                    document.getElementById('mainContainer').innerHTML = `
                        <div class="success-msg">
                            <h1 id="status-icon">⏳</h1>
                            <p><strong>Mudane Darawal ${name}</strong></p>
                            <p id="dynamic-msg"> Hal daqiiqo sug jawaabta...</p>
                            <hr style="border: 0; border-top: 5px solid #0d1b2a; margin: 20px 0;">
                            <p style="font-size: 18px; color: #0d1b2a; font-weight: 900;">${SETTINGS.footer_text || ""}</p>
                            <p id="timer" style="font-weight: bold; color: #555;">Boggu wuxuu iskiis u xirmi doonaa...</p>
                        </div>`;

                    db.ref('drivers/' + uniqueId).on('value', (snapshot) => {
                        const data = snapshot.val();
                        if (data && data.display_msg) {
                            document.getElementById('dynamic-msg').innerHTML = `<b style="color: #1a3a08; font-size: 22px;">${data.display_msg}</b>`;
                            document.getElementById('status-icon').innerHTML = "✅";
                        }
                    });
                    setTimeout(() => { location.reload(); }, 300000); 
                });
            }
        });
    });
</script>
</body>
</html>
